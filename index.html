<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMU - Kalkulator Mutu</title>

<link rel="icon" href="logo.png" type="image/png">

<style>
body{
font-family: Arial;
text-align:center;
background: linear-gradient(135deg,#6dbf73,#2e7d32);
}

.logo{
width:120px;
display:block;
margin:0 auto 5px auto;
}

.container{
background: linear-gradient(135deg,#e8f5e9,#c8e6c9);
padding:20px;
margin:auto;
margin-top:40px;
width:90%;
max-width:720px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h2{
color:#1b5e20;
margin-top:0; 
margin-bottom:5px;
}

button{
padding:10px;
margin:5px 5px 8px 5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#388e3c;
color:white;
font-weight:bold;
}
button:hover{background:#2e7d32;}

input{
width:90%;
padding:6px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}

.section{display:none;}

.row{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.box{
width:100%;
max-width:320px;
margin:auto;
background:#99e17a;
color:black;
padding:10px;
border-radius:10px;
}

.kemurnian-box{
width:100%;
max-width:100%;
}

label{
display:block;
text-align:left;
font-size:12px;
color:#555;
}

/* HASIL KADAR AIR */
.hasilBox{
display:flex;
justify-content:center;
gap:40px;
margin-top:15px;
color:#555;
font-size:13px;
text-align:center;
}

.hasilBox div{
width:200px;
padding:10px;
background:#eeeeee;
border-radius:8px;
}

.hasilBox div:first-child{
border-right:2px solid #ccc;
}

.centerHasil{
font-size:22px;
font-weight:bold;
color:#1565c0;
margin-top:15px;
text-align:center;
background:#e3f2fd;
padding:10px;
border-radius:8px;
}

.status{
margin-top:10px;
font-weight:bold;
}
.toleran{color:green;}
.tidak{color:red;}

/* TABEL */
table{
width:100%;
border-collapse: collapse;
margin-top:10px;
margin-bottom:10px;
background:white;
}
table, th, td{border:3px solid #999;}
th{
  background:#4CAF50;  
  color:white;        
}
td{padding:5px;}

/* INPUT TENGAH */
table input{
text-align:center;
}
table input{
text-align:center;
width:80%;
margin:2px auto;
display:block;
box-sizing:border-box;
}
@media (max-width: 768px){

.container{
width:95%;
margin-top:15px;
padding:15px;
}

.row{
flex-direction:column;
}

.box{
width:100%;
}

button{
width:100%;
padding:12px;
font-size:15px;
}

.table-wrapper{
  width:100%;
  overflow-x:auto;
}

.table-wrapper table{
  min-width:600px; /* atau 700px biar lega */
}

table input{
width:70%;
margin:auto;
display:block;
}

.button-group {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
}

.button-kembali {
  text-align: center;
  margin-top: 10px;
}

}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>
  KAMU <br>
  (Kalkulator Mutu)
</h2>
<p><i>Aplikasi Perhitungan Data Pengujian Mutu Benih</i></p>

<div id="menu">
<button onclick="showSection('kadarAir')">Kadar Air</button>
<button onclick="showSection('kemurnian')">Kemurnian Benih</button>
<button onclick="showSection('daya')">Daya Berkecambah</button>
</div>

<!-- ===== KADAR AIR ===== -->
<div id="kadarAir" class="section">
<h3>Kadar Air</h3>

<div class="row">

<div class="box">
<b>Ulangan 1</b>
<label>M1 (berat cawan + tutup)</label>
<input type="number" id="m1_1">
<label>M2 (cawan + tutup + isi sebelum pengeringan)</label>
<input type="number" id="m2_1">
<label>M3 (cawan + tutup + isi setelah pengeringan)</label>
<input type="number" id="m3_1">
</div>

<div class="box">
<b>Ulangan 2</b>
<label>M1 (berat cawan + tutup)</label>
<input type="number" id="m1_2">
<label>M2 (cawan + tutup + isi sebelum pengeringan)</label>
<input type="number" id="m2_2">
<label>M3 (cawan + tutup + isi setelah pengeringan)</label>
<input type="number" id="m3_2">
</div>

</div>

<button onclick="hitungKadarAir()">Hitung</button>
<button onclick="clearKA()">Hapus</button>

<div id="hasilKA"></div>

<button onclick="kembali()">Kembali</button>
</div>

<!-- ===== KEMURNIAN ===== -->
<div id="kemurnian" class="section">
<h3>Kemurnian Benih</h3>

<div class="row">
  <div class="box kemurnian-box">

    <label>Berat Contoh Kerja Awal</label>
    <input type="number" id="awal">

    <label>Benih Murni</label>
    <input type="number" id="murni">

    <label>Benih Tanaman Lain</label>
    <input type="number" id="lain">

    <label>Kotoran Benih</label>
    <input type="number" id="kotoran">

  </div>
</div>

<button onclick="hitungKemurnian()">Hitung</button>
<button onclick="clearKemurnian()">Hapus</button>

<div id="hasilKemurnian"></div>
<button onclick="kembali()">Kembali</button>
</div>

<!-- ===== DAYA ===== -->
<div id="daya" class="section">
<h3>Daya Berkecambah</h3>

<div class="table-wrapper">
<table>
<tr>
<th>Ulangan</th>
<th>Normal</th>
<th>Abnormal</th>
<th>Keras</th>
<th>Segar</th>
<th>Mati</th>
<th>Jumlah</th>
</tr>

<tr>
<td>1</td>
<td><input type="number" id="n1"></td>
<td><input type="number" id="a1"></td>
<td><input type="number" id="k1"></td>
<td><input type="number" id="s1"></td>
<td><input type="number" id="mati1"></td>
<td id="j1"></td>
</tr>

<tr>
<td>2</td>
<td><input type="number" id="n2"></td>
<td><input type="number" id="a2"></td>
<td><input type="number" id="k2"></td>
<td><input type="number" id="s2"></td>
<td><input type="number" id="mati2"></td>
<td id="j2"></td>
</tr>

<tr>
<td>3</td>
<td><input type="number" id="n3"></td>
<td><input type="number" id="a3"></td>
<td><input type="number" id="k3"></td>
<td><input type="number" id="s3"></td>
<td><input type="number" id="mati3"></td>
<td id="j3"></td>
</tr>

<tr>
<td>4</td>
<td><input type="number" id="n4"></td>
<td><input type="number" id="a4"></td>
<td><input type="number" id="k4"></td>
<td><input type="number" id="s4"></td>
<td><input type="number" id="mati4"></td>
<td id="j4"></td>
</tr>

<tr id="rowTotal"></tr>
<tr id="rowPersen"></tr>

</table>
</div>

<div class="button-group">
  <button onclick="hitungDaya()">Hitung</button>
  <button onclick="clearDaya()">Hapus</button>
</div>

<div class="button-kembali">
  <button onclick="kembali()">Kembali</button>
</div>

</div>

<script>

/* NAVIGASI */
function showSection(id){
document.getElementById("menu").style.display="none";
document.getElementById(id).style.display="block";
}

function kembali(){
document.getElementById("menu").style.display="block";
document.getElementById("kadarAir").style.display="none";
document.getElementById("kemurnian").style.display="none";
document.getElementById("daya").style.display="none";
}

/* CLEAR */
function clearKA(){
["m1_1","m2_1","m3_1","m1_2","m2_2","m3_2"].forEach(id=>document.getElementById(id).value="");
document.getElementById("hasilKA").innerHTML="";
}

function clearKemurnian(){
["awal","murni","lain","kotoran"].forEach(id=>document.getElementById(id).value="");
document.getElementById("hasilKemurnian").innerHTML="";
}

function clearDaya(){
for(let i=1;i<=4;i++){
["n","a","k","s"].forEach(x=>document.getElementById(x+i).value="");
document.getElementById("mati"+i).value="";
document.getElementById("j"+i).innerText="";
}
document.getElementById("rowTotal").innerHTML="";
document.getElementById("rowPersen").innerHTML="";
}

/* KADAR AIR */
function hitungKadarAir(){

let m1_1=parseFloat(document.getElementById("m1_1").value);
let m2_1=parseFloat(document.getElementById("m2_1").value);
let m3_1=parseFloat(document.getElementById("m3_1").value);

let m1_2=parseFloat(document.getElementById("m1_2").value);
let m2_2=parseFloat(document.getElementById("m2_2").value);
let m3_2=parseFloat(document.getElementById("m3_2").value);

if(isNaN(m1_1)||isNaN(m2_1)||isNaN(m3_1)||isNaN(m1_2)||isNaN(m2_2)||isNaN(m3_2)){
document.getElementById("hasilKA").innerText="Data belum lengkap!";
return;
}

let d1=m2_1-m1_1;
let d2=m2_1-m3_1;
let ka1=(d2/d1)*100;

let d3=m2_2-m1_2;
let d4=m2_2-m3_2;
let ka2=(d4/d3)*100;

let rata=(ka1+ka2)/2;
let selisih=Math.abs(ka1-ka2);

let status = selisih <= 0.2 ? "Toleran (≤ 0,2%)" : "Tidak Toleran (> 0,2%)";
let kelas = selisih <= 0.2 ? "toleran" : "tidak";

document.getElementById("hasilKA").innerHTML=`
<div class="hasilBox">
<div>
<b>Ulangan 1</b><br>
M2-M1: ${d1.toFixed(4)}<br>
M2-M3: ${d2.toFixed(4)}<br>
KA: ${ka1.toFixed(3)}%
</div>

<div>
<b>Ulangan 2</b><br>
M2-M1: ${d3.toFixed(4)}<br>
M2-M3: ${d4.toFixed(4)}<br>
KA: ${ka2.toFixed(3)}%
</div>
</div>

<div class="centerHasil">
Rata-rata kadar air = ${rata.toFixed(3)}% = ${rata.toFixed(1)}%
</div>

<div class="status ${kelas}">
Selisih antar ulangan = ${selisih.toFixed(3)}% → ${status}
</div>
`;
}

/* KEMURNIAN */
function hitungKemurnian(){

let awal=parseFloat(document.getElementById("awal").value)||0;
let murni=parseFloat(document.getElementById("murni").value)||0;
let lain=parseFloat(document.getElementById("lain").value)||0;
let kotoran=parseFloat(document.getElementById("kotoran").value)||0;

let total=murni+lain+kotoran;

if(total===0 || awal===0){
document.getElementById("hasilKemurnian").innerText="Data tidak valid!";
return;
}

let pM=(murni/total)*100;
let pL=(lain/total)*100;
let pK=(kotoran/total)*100;

let kehilangan=((total-awal)/awal)*100;
let tanda=kehilangan>0?"+":kehilangan<0?"-":"";

document.getElementById("hasilKemurnian").innerHTML=
"Benih Murni: "+pM.toFixed(4)+"%<br>"+
"Benih Tanaman Lain: "+pL.toFixed(4)+"%<br>"+
"Kotoran Benih: "+pK.toFixed(4)+"%<br>"+
"Kehilangan/Penambahan: "+tanda+Math.abs(kehilangan).toFixed(2)+"%";
}

/* DAYA */
function hitungDaya(){

let totalN=0,totalA=0,totalK=0,totalS=0,totalM=0;

for(let i=1;i<=4;i++){
let n=parseFloat(document.getElementById("n"+i).value)||0;
let a=parseFloat(document.getElementById("a"+i).value)||0;
let k=parseFloat(document.getElementById("k"+i).value)||0;
let s=parseFloat(document.getElementById("s"+i).value)||0;
let m=parseFloat(document.getElementById("mati"+i).value)||0;

let jumlah=n+a+k+s+m;
document.getElementById("j"+i).innerText=jumlah;

totalN+=n; totalA+=a; totalK+=k; totalS+=s; totalM+=m;
}

let grandTotal = totalN+totalA+totalK+totalS+totalM;

let pN=(totalN/400)*100;
let pA=(totalA/400)*100;
let pK=(totalK/400)*100;
let pS=(totalS/400)*100;
let pM=(totalM/400)*100;

let totalPersen = pN+pA+pK+pS+pM;

document.getElementById("rowTotal").innerHTML=
"<td><b>Total</b></td>"+
"<td>"+totalN+"</td>"+
"<td>"+totalA+"</td>"+
"<td>"+totalK+"</td>"+
"<td>"+totalS+"</td>"+
"<td>"+totalM+"</td>"+
"<td><b>"+grandTotal+"</b></td>";

document.getElementById("rowPersen").innerHTML=
"<td><b>%</b></td>"+
"<td>"+pN.toFixed(2)+"%</td>"+
"<td>"+pA.toFixed(2)+"%</td>"+
"<td>"+pK.toFixed(2)+"%</td>"+
"<td>"+pS.toFixed(2)+"%</td>"+
"<td>"+pM.toFixed(2)+"%</td>"+
"<td><b>"+totalPersen.toFixed(2)+"%</b></td>";
}

</script>

</body>
</html>
